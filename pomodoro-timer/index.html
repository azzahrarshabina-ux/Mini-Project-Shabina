<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-pomodoro: #e11d48;
            --color-break: #0891b2;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        .pulse-ring {
            animation: pulse-ring 1.2s ease-out infinite;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fade-in 0.4s ease forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center transition-colors duration-700 bg-gradient-to-br from-rose-50 via-rose-100 to-pink-200" id="appBody">

    <div class="fade-in flex flex-col items-center gap-6 w-full max-w-sm px-6 py-8 rounded-3xl shadow-2xl mx-4"
         style="background: rgba(255,255,255,0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.6);">

        <!-- Mode Tabs -->
        <div class="flex gap-2 w-full">
            <button id="btnFocus"
                    class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all duration-300 bg-rose-500 text-white shadow-md">
                Focus
            </button>
            <button id="btnShortBreak"
                    class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all duration-300 text-rose-400"
                    style="background: rgba(255,255,255,0.4);">
                Short Break
            </button>
            <button id="btnLongBreak"
                    class="flex-1 py-2 rounded-xl text-sm font-semibold transition-all duration-300 text-rose-400"
                    style="background: rgba(255,255,255,0.4);">
                Long Break
            </button>
        </div>

        <!-- Timer Circle -->
        <div class="relative flex items-center justify-center mt-2">
            <!-- Pulse ring saat running -->
            <div id="pulseRing"
                 class="absolute w-52 h-52 rounded-full hidden"
                 style="background: rgba(225,29,72,0.15);"></div>

            <!-- SVG progress circle -->
            <svg class="w-52 h-52 -rotate-90" viewBox="0 0 200 200">
                <!-- Track -->
                <circle cx="100" cy="100" r="88"
                        fill="none"
                        stroke="rgba(225,29,72,0.15)"
                        stroke-width="10" />
                <!-- Progress -->
                <circle id="progressCircle"
                        cx="100" cy="100" r="88"
                        fill="none"
                        stroke="#e11d48"
                        stroke-width="10"
                        stroke-linecap="round"
                        stroke-dasharray="553"
                        stroke-dashoffset="0"
                        class="transition-all duration-1000" />
            </svg>

            <!-- Timer text di tengah -->
            <div class="absolute flex flex-col items-center">
                <span id="timerDisplay"
                      class="text-6xl font-extrabold tabular-nums tracking-tight text-rose-600">
                    25:00
                </span>
                <span id="modeLabel"
                      class="text-xs font-medium text-rose-400 mt-1 uppercase tracking-widest">
                    Focus Time
                </span>
            </div>
        </div>

        <!-- Tombol kontrol -->
        <div class="flex gap-4 items-center">
            <!-- Reset -->
            <button id="resetBtn"
                    class="w-11 h-11 rounded-full flex items-center justify-center text-rose-400 transition-all duration-200 hover:scale-110 active:scale-95"
                    style="background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.7);"
                    title="Reset">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>

            <!-- Start / Pause -->
            <button id="startPauseBtn"
                    class="w-20 h-20 rounded-full flex items-center justify-center text-white text-xl font-bold shadow-lg transition-all duration-200 hover:scale-105 active:scale-95 bg-rose-500">
                <svg id="iconPlay" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg id="iconPause" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>

            <!-- Skip -->
            <button id="skipBtn"
                    class="w-11 h-11 rounded-full flex items-center justify-center text-rose-400 transition-all duration-200 hover:scale-110 active:scale-95"
                    style="background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.7);"
                    title="Skip">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
                </svg>
            </button>
        </div>

        <!-- Session tracker -->
        <div class="flex flex-col items-center gap-2 w-full">
            <p class="text-xs text-rose-400 font-medium uppercase tracking-widest">Session</p>
            <div class="flex gap-2" id="sessionDots">
                <!-- dots dirender oleh JS -->
            </div>
        </div>

        <!-- Stats -->
        <div class="flex gap-4 w-full">
            <div class="flex-1 flex flex-col items-center py-3 rounded-2xl"
                 style="background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.6);">
                <span id="completedCount" class="text-2xl font-extrabold text-rose-500">0</span>
                <span class="text-xs text-rose-400 mt-0.5">Completed</span>
            </div>
            <div class="flex-1 flex flex-col items-center py-3 rounded-2xl"
                 style="background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.6);">
                <span id="totalMinutes" class="text-2xl font-extrabold text-rose-500">0</span>
                <span class="text-xs text-rose-400 mt-0.5">Minutes</span>
            </div>
            <div class="flex-1 flex flex-col items-center py-3 rounded-2xl"
                 style="background: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.6);">
                <span id="currentStreak" class="text-2xl font-extrabold text-rose-500">0</span>
                <span class="text-xs text-rose-400 mt-0.5">Streak</span>
            </div>
        </div>

    </div>

    <script src="./index.js"></script>
</body>
</html>
